name: Build Desktop Release

# 公开构建/发布枢纽：手动触发，用只读 PAT 临时 checkout 私有源码仓库
# （thomas0x01/crediscope-llm）到 runner，构建完成后 runner 即销毁。
# 源码不进入本仓库，只有制品发布到 Release（即对外下载站）。
on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: '私有仓库 crediscope-llm 的 ref（分支/tag/sha）'
        required: true
        default: 'main'
      release_tag:
        description: '本仓库 release 的 tag（如 v0.1.0-test.16）'
        required: true
      notes:
        description: '下载页更新说明（;分隔多条，可空）'
        required: false
        default: ''
      pre_tag:
        description: '下载页内测版 tag（可空，如 v0.1.0-test.25）'
        required: false
        default: ''

jobs:
  # 测试门禁：全量 pytest（含冻结模拟 L0）不过则不构建，
  # 防"忘了跑测试"——回归测试不靠记忆生效
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: thomas0x01/crediscope-llm
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.BUILD_PAT }}
          path: src

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r src/crediscope-llm/requirements.txt

      - name: Run tests
        working-directory: src/crediscope-llm
        run: python -m pytest tests -q

  build-macos:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: thomas0x01/crediscope-llm
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.BUILD_PAT }}
          path: src

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install backend dependencies
        run: pip install -r src/crediscope-llm/requirements.txt pyinstaller

      - name: Prepare sidecar
        env:
          RESOURCE_KEY_PASSPHRASE: ${{ secrets.RESOURCE_KEY_PASSPHRASE }}
        run: bash src/desktop/scripts/prepare-sidecar.sh

      - name: Sidecar smoke test
        run: python3 src/desktop/scripts/sidecar_smoke.py --server src/crediscope-llm/dist/crediscope-server --app-root src/crediscope-llm

      - name: Sync desktop version
        shell: bash
        env:
          TAG: ${{ inputs.release_tag }}
        run: |
          VERSION="${TAG#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          python3 src/desktop/scripts/bump-version.py "${VERSION}"

      - name: Build Tauri (Apple Silicon)
        env:
          RESOURCE_KEY_PASSPHRASE: ${{ secrets.RESOURCE_KEY_PASSPHRASE }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd src/desktop
          npm install
          npm run tauri build -- --target aarch64-apple-darwin

      - name: Attach macOS dmg to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          draft: false
          # 发布卫生（见私有仓 AGENTS.md）：带后缀的 tag（test/beta/rc）标 prerelease
          prerelease: ${{ contains(inputs.release_tag, '-') }}
          generate_release_notes: true
          files: |
            src/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload updater signatures (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: updater-sig-macos
          path: src/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 1

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: thomas0x01/crediscope-llm
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.BUILD_PAT }}
          path: src

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install backend dependencies
        run: pip install -r src/crediscope-llm/requirements.txt pyinstaller

      - name: Prepare sidecar
        env:
          RESOURCE_KEY_PASSPHRASE: ${{ secrets.RESOURCE_KEY_PASSPHRASE }}
        run: powershell -ExecutionPolicy Bypass -File .\src\desktop\scripts\prepare-sidecar.ps1

      - name: Sidecar smoke test
        run: python src/desktop/scripts/sidecar_smoke.py --server src/crediscope-llm/dist/crediscope-server.exe --app-root src/crediscope-llm

      - name: Sync desktop version
        shell: bash
        env:
          TAG: ${{ inputs.release_tag }}
        run: |
          VERSION="${TAG#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          python3 src/desktop/scripts/bump-version.py --windows-msi "${VERSION}"

      - name: Build Tauri
        env:
          RESOURCE_KEY_PASSPHRASE: ${{ secrets.RESOURCE_KEY_PASSPHRASE }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd src/desktop
          npm install
          npm run tauri build

      - name: Attach Windows installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          draft: false
          # 发布卫生（见私有仓 AGENTS.md）：带后缀的 tag（test/beta/rc）标 prerelease
          prerelease: ${{ contains(inputs.release_tag, '-') }}
          generate_release_notes: true
          files: |
            src/desktop/src-tauri/target/release/bundle/msi/*.msi
            src/desktop/src-tauri/target/release/bundle/nsis/*.exe
            src/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload updater signatures (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: updater-sig-windows
          path: src/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          retention-days: 1

  # 生成 Tauri updater 更新清单并提交到本仓（endpoint 指向 latest.json）
  publish-manifest:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout private source (for gen script)
        uses: actions/checkout@v4
        with:
          repository: thomas0x01/crediscope-llm
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.BUILD_PAT }}
          path: src

      - uses: actions/download-artifact@v4
        with:
          pattern: updater-sig-*
          path: updater_artifacts
          merge-multiple: true

      - name: Generate latest.json
        run: python3 src/desktop/scripts/gen_latest_json.py --repo thomas0x01/crediscope-release --tag "${{ inputs.release_tag }}" --assets-dir updater_artifacts --out latest.json --notes "${{ inputs.notes }}"

      - name: Commit latest.json
        run: |
          git config user.name "crediscope-bot"
          git config user.email "bot@crediscope.local"
          git add latest.json
          git diff --cached --quiet && echo "latest.json 无变化" && exit 0
          git commit -m "chore(updater): latest.json → ${{ inputs.release_tag }}"
          git push

      - name: Attach latest.json to the updates release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: updates
          files: latest.json

      # ── 境内分发：S3 API 直传 R2（全链路不出 Cloudflare 网络） ──
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist_artifacts
          gh release download "${{ inputs.release_tag }}" \
            -R thomas0x01/crediscope-release -D dist_artifacts \
            -p "*.dmg" -p "*.exe" -p "*.msi" -p "*.tar.gz" -p "*.sig"

      - name: Generate download page
        run: |
          python3 src/desktop/scripts/gen_release_page.py \
            --tag "${{ inputs.release_tag }}" \
            --base-url "https://dl.thomas0x00.uk/releases/${{ inputs.release_tag }}" \
            --notes "${{ inputs.notes || '见提交记录' }}" \
            --pre-tag "${{ inputs.pre_tag }}" \
            --out dist_page

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          export AWS_EC2_METADATA_DISABLED=true
          EP="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 sync dist_artifacts/ "s3://${R2_BUCKET}/releases/${{ inputs.release_tag }}/" \
            --endpoint-url "$EP" --no-progress
          aws s3 cp dist_page/index.html "s3://${R2_BUCKET}/index.html" --endpoint-url "$EP"
          aws s3 cp dist_page/logo.png "s3://${R2_BUCKET}/logo.png" --endpoint-url "$EP"
          aws s3 cp dist_page/feishu-qr.png "s3://${R2_BUCKET}/feishu-qr.png" --endpoint-url "$EP"
          aws s3 cp latest.json "s3://${R2_BUCKET}/latest.json" --endpoint-url "$EP"
